<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>东南大学集成电路学院导师研究画像</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-2: #f8fafb;
      --text: #17202a;
      --muted: #607080;
      --line: #d9e0e7;
      --accent: #0f766e;
      --accent-2: #2563eb;
      --warn: #b45309;
      --chip: #eef6f5;
      --shadow: 0 8px 24px rgba(18, 29, 43, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }
    a { color: var(--accent-2); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .app-header {
      padding: 20px 24px 16px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 700;
    }
    .subline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 6px;
      white-space: normal;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(88px, 1fr));
      gap: 8px;
      min-width: 320px;
    }
    .stat {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .stat strong { display: block; font-size: 20px; line-height: 1.1; }
    .stat span { display: block; color: var(--muted); font-size: 12px; margin-top: 4px; }
    .layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 360px;
      gap: 16px;
      padding: 16px;
      max-width: 1680px;
      margin: 0 auto;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .filters {
      position: sticky;
      top: 102px;
      align-self: start;
      padding: 14px;
    }
    .filters h2,
    .map-panel h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin: 14px 0 6px;
    }
    input, select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    .quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .tag-button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 6px 8px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.2;
      max-width: 100%;
      overflow-wrap: anywhere;
    }
    .tag-button.active {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }
    .result-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .result-bar strong { font-size: 16px; }
    .result-bar span { color: var(--muted); font-size: 13px; }
    .cards {
      display: grid;
      gap: 12px;
    }
    .mentor-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .mentor-name {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }
    .mentor-title {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0;
    }
    .pill {
      border-radius: 6px;
      background: var(--chip);
      color: #0b5d56;
      border: 1px solid #cce4e1;
      padding: 4px 7px;
      font-size: 12px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .section-title {
      margin: 12px 0 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }
    .summary-list {
      margin: 0;
      padding-left: 18px;
      color: #2d3a45;
      line-height: 1.65;
      font-size: 14px;
    }
    .summary-list li { margin: 4px 0; }
    .detail {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .mentor-card.open .detail { display: block; }
    .toggle {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      min-width: 72px;
      height: 34px;
      cursor: pointer;
      color: var(--accent);
      font-weight: 700;
    }
    .gap {
      color: var(--warn);
    }
    .map-panel {
      position: sticky;
      top: 102px;
      align-self: start;
      max-height: calc(100vh - 126px);
      overflow: auto;
      padding: 14px;
    }
    .tree {
      display: grid;
      gap: 8px;
    }
    .tree-group {
      border-left: 2px solid #b8d8d4;
      padding-left: 10px;
    }
    .tree-node {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 6px;
      padding: 7px 8px;
      margin-bottom: 6px;
      cursor: pointer;
      overflow-wrap: anywhere;
      font-size: 13px;
      line-height: 1.35;
    }
    .tree-node:hover { border-color: var(--accent); }
    .tree-node .count { color: var(--muted); }
    .tree-child {
      margin-left: 12px;
      border-left: 1px dashed #b6c4cf;
      padding-left: 8px;
    }
    .tree-leaf {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      margin: 4px 0 8px;
    }
    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fff;
    }
    @media (max-width: 1180px) {
      .layout { grid-template-columns: 260px minmax(0, 1fr); }
      .map-panel { position: static; grid-column: 1 / -1; max-height: none; }
    }
    @media (max-width: 760px) {
      .app-header { position: static; padding: 16px; }
      .title-row { display: block; }
      .stats { min-width: 0; grid-template-columns: repeat(3, 1fr); margin-top: 12px; }
      .layout { grid-template-columns: 1fr; padding: 12px; }
      .filters { position: static; }
      .card-head { display: block; }
      .toggle { margin-top: 10px; width: 100%; }
    }
  </style>
</head>

      <div class="cards" id="cards"></div>
    </section>

    <aside class="map-panel panel">
      <h2>思维导图式结构</h2>
      <div class="tree" id="tree"></div>
    </aside>
  </main>

772/list.htm", "accessed_at": "2026-07-02"}, {"title": "罗斌 - 东南大学集成电路学院教师主页", "url": "https://ic.seu.edu.cn/lb/main.htm", "accessed_at": "2026-07-02"}], "supplemental_sources": [], "information_gaps": ["官网未明确披露研究方向", "官网未明确披露代表性成果", "官网未明确披露近5年研究进展"]}, {"name": "陈思静", "title": "博士后", "unit": "东南大学集成电路学院", "research_directions": ["公开资料未明确披露"], "keywords": ["公开资料未明确披露"], "representative_achievements": [], "recent_progress": [], "platform_or_team": [], "collaboration_entry_points": ["公开资料不足，建议先通过学院主页或教师主页确认具体合作方向。"], "official_sources": [{"title": "东南大学集成电路学院全职教师", "url": "https://ic.seu.edu.cn/47772/list.htm", "accessed_at": "2026-07-02"}, {"title": "陈思静 - 东南大学集成电路学院教师主页", "url": "https://ic.seu.edu.cn/csj/main.htm", "accessed_at": "2026-07-02"}], "supplemental_sources": [], "information_gaps": ["官网未明确披露研究方向", "官网未明确披露代表性成果", "官网未明确披露近5年研究进展"]}]};
    const DIRECTION_TAGS = ["MEMS", "可靠性", "传感器", "EDA", "人工智能", "集成电路设计", "低功耗", "封装", "纳米", "存储", "光电", "高能效", "半导体材料", "射频", "可重构", "先进封装", "模拟集成电路", "无线传感", "失效分析", "三维集成", "数字集成电路", "功率器件", "微纳制造", "NEMS", "神经网络", "智能芯片", "计算架构", "近似计算", "类脑"];
    const state = { search: "", direction: "", source: "" };

    const searchInput = document.getElementById("search");
    const directionSelect = document.getElementById("direction");
    const sourceFilter = document.getElementById("sourceFilter");
    const cards = document.getElementById("cards");
    const tree = document.getElementById("tree");
    const resultCount = document.getElementById("resultCount");
    const quickTags = document.getElementById("quickTags");

    function textOfMentor(m) {
      return [
        m.name,
        m.title,
        m.unit,
        ...(m.research_directions || []),
        ...(m.keywords || []),
        ...(m.collaboration_entry_points || []),
        ...(m.representative_achievements || []).map(x => x.summary),
        ...(m.recent_progress || []).map(x => x.summary)
      ].join(" ").toLowerCase();
    }

    function mentorMatches(m) {
      const q = state.search.trim().toLowerCase();
      const text = textOfMentor(m);
      if (q && !text.includes(q)) return false;
      if (state.direction && !(m.research_directions || []).includes(state.direction) && !(m.keywords || []).includes(state.direction) && !text.includes(state.direction.toLowerCase())) return false;
      if (state.source === "progress" && !(m.recent_progress || []).length) return false;
      if (state.source === "achievement" && !(m.representative_achievements || []).length) return false;
      if (state.source === "gap" && !(m.information_gaps || []).length) return false;
      return true;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      }[ch]));
    }

    function renderList(items, fallback) {
      if (!items || !items.length) return `<li>${escapeHtml(fallback)}</li>`;
      return items.map(item => {
        if (typeof item === "string") return `<li>${escapeHtml(item)}</li>`;
        const source = item.url ? ` <a href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">来源</a>` : "";
        const type = item.type ? `${escapeHtml(item.type)}｜` : "";
        return `<li>${escapeHtml(item.year || "时间未明确")}｜${type}${escapeHtml(item.summary || "")}${source}</li>`;
      }).join("");
    }

    function renderSources(items) {
      if (!items || !items.length) return "<li>无</li>";
      return items.map(item => `<li><a href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">${escapeHtml(item.title || item.url)}</a></li>`).join("");
    }

    function renderCards(filtered) {
      resultCount.textContent = `${filtered.length} 位`;
      if (!filtered.length) {
        cards.innerHTML = '<div class="empty">没有匹配结果，请调整关键词或筛选条件。</div>';
        return;
      }
      cards.innerHTML = filtered.map((m, index) => {
        const directions = (m.research_directions || []).slice(0, 4).map(x => `<span class="pill">${escapeHtml(x)}</span>`).join("");
        const keywords = (m.keywords || []).filter(x => x !== "公开资料未明确披露").slice(0, 8).map(x => `<span class="pill">${escapeHtml(x)}</span>`).join("");
        return `
          <article class="mentor-card" data-index="${index}">
            <div class="card-head">
              <div>
                <h3 class="mentor-name">${escapeHtml(m.name)}</h3>
                <div class="mentor-title">${escapeHtml(m.title || "公开资料未明确披露")}｜${escapeHtml(m.unit || "东南大学集成电路学院")}</div>
              </div>
              <button class="toggle" type="button" onclick="this.closest('.mentor-card').classList.toggle('open')">展开</button>
            </div>
            <div class="pill-row">${directions}</div>
            <div class="pill-row">${keywords}</div>
            <div class="section-title">近 5 年研究进展</div>
            <ul class="summary-list">${renderList((m.recent_progress || []).slice(0, 3), "公开资料未明确披露")}</ul>
            <div class="section-title">代表性成果</div>
            <ul class="summary-list">${renderList((m.representative_achievements || []).slice(0, 2), "公开资料未明确披露")}</ul>
            <div class="detail">
              <div class="section-title">合作切入点</div>
              <ul class="summary-list">${renderList(m.collaboration_entry_points || [], "公开资料不足，暂不推断")}</ul>
              <div class="section-title">平台/团队线索</div>
              <ul class="summary-list">${renderList(m.platform_or_team || [], "公开资料未明确披露")}</ul>
              <div class="section-title">官网来源</div>
              <ul class="summary-list">${renderSources(m.official_sources || [])}</ul>
              <div class="section-title">补充来源</div>
              <ul class="summary-list">${renderSources(m.supplemental_sources || [])}</ul>
              <div class="section-title gap">信息缺口</div>
              <ul class="summary-list gap">${renderList(m.information_gaps || [], "暂无明确缺口")}</ul>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderTree(filtered) {
      const groups = new Map();
      for (const mentor of filtered) {
        const directions = (mentor.research_directions || []).filter(direction => direction && direction !== "公开资料未明确披露");
        for (const direction of directions) {
          if (!groups.has(direction)) groups.set(direction, []);
          groups.get(direction).push(mentor);
        }
      }
      const ordered = [...groups.entries()].sort((a, b) => b[1].length - a[1].length).slice(0, 28);
      if (!ordered.length) {
        tree.innerHTML = '<div class="empty">暂无结构节点。</div>';
        return;
      }
      tree.innerHTML = ordered.map(([direction, members]) => {
        const children = members.slice(0, 8).map(m => {
          const leaf = (m.recent_progress && m.recent_progress[0]) ? m.recent_progress[0].summary : ((m.representative_achievements && m.representative_achievements[0]) ? m.representative_achievements[0].summary : "公开资料未明确披露近期成果");
          const shortLeaf = leaf.length > 86 ? leaf.slice(0, 86) + "..." : leaf;
          return `<div class="tree-child">
            <div class="tree-node" onclick="setSearch('${escapeHtml(m.name)}')">${escapeHtml(m.name)} <span class="count">${escapeHtml(m.title || "")}</span></div>
            <div class="tree-leaf">${escapeHtml(shortLeaf)}</div>
          </div>`;
        }).join("");
        return `<div class="tree-group">
          <div class="tree-node" onclick="setDirection('${escapeHtml(direction)}')">${escapeHtml(direction)} <span class="count">${members.length} 位</span></div>
          ${children}
        </div>`;
      }).join("");
    }

    function applyFilters() {
      const filtered = DATA.mentors.filter(mentorMatches);
      renderCards(filtered);
      renderTree(filtered);
      [...quickTags.children].forEach(btn => btn.classList.toggle("active", btn.dataset.direction === state.direction));
    }

    function setDirection(direction) {
      state.direction = direction;
      directionSelect.value = direction;
      applyFilters();
    }

    function setSearch(name) {
      state.search = name;
      searchInput.value = name;
      applyFilters();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function init() {
      for (const direction of DIRECTION_TAGS) {
        const option = document.createElement("option");
        option.value = direction;
        option.textContent = direction.length > 42 ? direction.slice(0, 42) + "..." : direction;
        directionSelect.appendChild(option);
      }
      for (const direction of DIRECTION_TAGS.slice(0, 12)) {
        const btn = document.createElement("button");
        btn.className = "tag-button";
        btn.type = "button";
        btn.dataset.direction = direction;
        btn.textContent = direction;
        btn.onclick = () => setDirection(state.direction === direction ? "" : direction);
        quickTags.appendChild(btn);
      }
      searchInput.addEventListener("input", event => {
        state.search = event.target.value;
        applyFilters();
      });
      directionSelect.addEventListener("change", event => {
        state.direction = event.target.value;
        applyFilters();
      });
      sourceFilter.addEventListener("change", event => {
        state.source = event.target.value;
        applyFilters();
      });
      applyFilters();
    }

    init();
  </script>
</body>
